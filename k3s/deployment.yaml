apiVersion: v1
kind: Secret
metadata:
  name: isaac-db-credentials
  namespace: apps
type: Opaque
stringData:
  username: isaac
  password: isaac
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: isaac-fansite
  namespace: apps
spec:
  replicas: 2
  selector:
    matchLabels:
      app: isaac-fansite
  template:
    metadata:
      labels:
        app: isaac-fansite
    spec:
      containers:
        - name: isaac-fansite
          image: 178.170.116.15:32200/isaac-fansite:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "pg-cluster-rw.bdd.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "isaac"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: isaac-db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: isaac-db-credentials
                  key: password
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: isaac-fansite
  namespace: apps
spec:
  type: NodePort
  selector:
    app: isaac-fansite
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 32300