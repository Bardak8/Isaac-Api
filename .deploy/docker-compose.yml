services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: isaac
      DB_PASSWORD: isaac
      DB_NAME: isaac
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: isaac
      POSTGRES_PASSWORD: isaac
      POSTGRES_DB: isaac
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isaac"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: