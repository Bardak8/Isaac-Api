<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favoris - Isaac Wiki</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/" class="logo">☠ Isaac Wiki</a>
        <div class="nav-links">
            <a href="/search">Rechercher</a>
            <a href="/favorites">Favoris</a>
        </div>
    </nav>
    <main>
        <div class="page-header">
            <h1>★ Mes Favoris</h1>
        </div>
        {{if .error}}
            <div class="error">{{.error}}</div>
        {{end}}
        {{if .favorites}}
            <div class="results-grid">
                {{range .favorites}}
                <a href="/detail/{{.Title}}" class="result-card">
                    {{if .Thumbnail}}
                    <img src="{{.Thumbnail}}" alt="{{.Title}}">
                    {{end}}
                    <h3>{{.Title}}</h3>
                </a>
                {{end}}
            </div>
        {{else}}
            <div class="empty">
                <p>Aucun favori pour l'instant.</p>
                <a href="/search" class="btn btn-primary">Commencer à explorer</a>
            </div>
        {{end}}
    </main>
    <footer>
        <p>Fan site non officiel — données issues du <a href="https://bindingofisaacrebirth.fandom.com" target="_blank">wiki officiel</a></p>
    </footer>
</body>
</html>
